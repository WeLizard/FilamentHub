services:
  postgres:
    image: postgres:15-alpine
    container_name: filamenthub_postgres_prod
    command: postgres -c log_checkpoints=off -c log_min_messages=warning
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filamenthub}
      POSTGRES_USER: ${POSTGRES_USER:-filamenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filamenthub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - filamenthub_network

  redis:
    image: redis:7-alpine
    container_name: filamenthub_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - filamenthub_network

  # Ограниченный доступ к Docker API для admin-stats: наружу отдаются только
  # GET-эндпоинты /containers (list/inspect/stats); POST/exec/create запрещены.
  # Прямое монтирование docker.sock в backend убрано — компрометация backend
  # больше не даёт контроль над хостом.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: filamenthub_docker_proxy_prod
    environment:
      CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - filamenthub_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: filamenthub_backend_prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level warning --no-access-log
    volumes:
      # Персистентные данные
      - uploads_data:/app/uploads
      # Дистрибутивы OrcaSlicer читаем напрямую с хоста
      - ./backend/distributions:/app/distributions
      # Логи можно хранить на хосте (не критично)
      - ./backend/logs:/app/logs
      # Wiki content - чтобы можно было редактировать без пересборки
      - ./backend/wiki_content:/app/wiki_content
    # Backend НЕ пробрасываем наружу - доступ только через nginx (frontend)
    # ports:
    #   - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      # Формируем DATABASE_URL с правильным экранированием пароля
      # Используем отдельные переменные для избежания проблем с @ в пароле
      # НЕ задаем DATABASE_URL здесь - он будет сформирован в config.py с правильным экранированием
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-filamenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-filamenthub}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # docker CLI (admin-stats) ходит через socket-proxy, не в сокет хоста
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - filamenthub_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
        VITE_AUTH_WEB_MODE: ${VITE_AUTH_WEB_MODE:-}
        VITE_AUTH_CSRF_HEADER_NAME: ${VITE_AUTH_CSRF_HEADER_NAME:-}
        VITE_AUTH_CSRF_COOKIE_NAME: ${VITE_AUTH_CSRF_COOKIE_NAME:-}
    container_name: filamenthub_frontend_prod
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    volumes:
      # SSL certificates from Let's Encrypt
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - filamenthub_network

volumes:
  # Базы данных
  postgres_data:
  redis_data:
  # Пользовательские данные (сохраняются при обновлениях)
  uploads_data:  # Загруженные файлы (proof files для brand requests) + database_dumps + QR-коды

networks:
  filamenthub_network:
    driver: bridge
