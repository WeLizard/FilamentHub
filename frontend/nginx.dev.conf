server {
    listen 80;
    server_name localhost _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Health checks (backend root endpoint)
    location = /health {
        proxy_pass http://backend-dev:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Compatibility alias for monitors that use /api/health
    location = /api/health {
        proxy_pass http://backend-dev:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # API proxy to backend-dev
    location /api {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 180s;
    }

    # Spool compat proxy (clean path for Moonraker/HH integration)
    location /spool_compat {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 180s;
    }

    location ^~ /uploads {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
    }

    location ^~ /qr_codes {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /distributions {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location ^~ /wiki_content {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/(sitemap\.xml|robots\.txt)$ {
        proxy_pass http://backend-dev:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Serve the SPA only for routes that actually exist in React Router. Unknown
    # pages and files must keep a real HTTP 404 for crawler parity with production.
    location = / {
        try_files /index.html =404;
        expires -1;
    }

    location = /index.html {
        expires -1;
    }

    location ~ ^/(?:filaments/[^./]+|brands/[^./]+|profile|calculator|workspace|admin|download|wiki(?:/articles/[^./]+|/[^./]+)?|embed(?:/catalog)?|user-agreement|privacy-policy|personal-data-consent|reset-password|confirm-email-change|brand-invite/[^./]+|oauth/callback/[^./]+|oauth/plugin-start/[^./]+|quote/[^./]+)/?$ {
        try_files $uri /index.html =404;
        expires -1;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
