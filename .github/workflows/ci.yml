name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install system deps for weasyprint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b libcairo2

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app

      - name: Run tests (pytest, in-memory SQLite)
        run: pytest --no-cov-on-fail
        env:
          SECRET_KEY: ci-secret-key
          DEBUG: "false"
          REDIS_URL: "memory://"

  frontend:
    name: Frontend (type-check + build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check + production build
        run: npm run build

      - name: Tests (vitest)
        run: npm test
