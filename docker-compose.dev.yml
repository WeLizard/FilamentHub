services:
  postgres-dev:
    image: postgres:15-alpine
    container_name: filamenthub_postgres_dev
    environment:
      POSTGRES_DB: filamenthub_dev
      POSTGRES_USER: filamenthub
      POSTGRES_PASSWORD: devpass123
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamenthub -d filamenthub_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - filamenthub_dev

  redis-dev:
    image: redis:7-alpine
    container_name: filamenthub_redis_dev
    command: redis-server --requirepass devredis123
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devredis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - filamenthub_dev

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filamenthub_backend_dev
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres-dev
      POSTGRES_PORT: 5432
      POSTGRES_USER: filamenthub
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: filamenthub_dev
      REDIS_URL: redis://:devredis123@redis-dev:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      ADMIN_PASSWORD: admin123
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      AUTH_WEB_MODE: dual
      AUTH_COOKIE_SAMESITE: lax
      AUTH_COOKIE_SECURE: "false"
    networks:
      - filamenthub_dev

  frontend-dev:
    image: node:20-alpine
    container_name: filamenthub_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8001
      VITE_PROXY_TARGET: http://backend-dev:8000
      VITE_RECAPTCHA_SITE_KEY: ""
      VITE_AUTH_WEB_MODE: dual
      VITE_AUTH_CSRF_HEADER_NAME: X-CSRF-Token
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend-dev
    networks:
      - filamenthub_dev

volumes:
  postgres_dev_data:

networks:
  filamenthub_dev:
    driver: bridge
