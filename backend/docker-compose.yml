version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: filamenthub_postgres
    environment:
      POSTGRES_DB: filamenthub
      POSTGRES_USER: filamenthub
      POSTGRES_PASSWORD: filamenthub_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamenthub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: filamenthub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API (раскомментируй когда будет готов)
  # backend:
  #   build: .
  #   container_name: filamenthub_backend
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  #   volumes:
  #     - .:/app
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://filamenthub:filamenthub_dev_password@postgres:5432/filamenthub
  #     - REDIS_URL=redis://redis:6379/0
  #   env_file:
  #     - .env

volumes:
  postgres_data:
  redis_data:

