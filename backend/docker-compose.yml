services:
  postgres:
    image: postgres:15-alpine
    container_name: filamenthub_postgres
    environment:
      POSTGRES_DB: filamenthub
      POSTGRES_USER: filamenthub
      POSTGRES_PASSWORD: filamenthub_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filamenthub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: filamenthub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: filamenthub_backend
    command: sh -c "sleep 5 && python app/db/init_data.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Переопределяем только те переменные, которые отличаются в Docker
      DATABASE_URL: postgresql+asyncpg://filamenthub:filamenthub_dev_password@filamenthub_postgres:5432/filamenthub
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:


