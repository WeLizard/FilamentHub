<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ subject }}</title>
  </head>
  <body style="margin:0;background:#f4f1f8;color:#252033;font-family:Arial,sans-serif;">
    <div style="max-width:680px;margin:0 auto;padding:32px 18px;">
      <div style="overflow:hidden;border:1px solid #ddd5e8;border-radius:18px;background:#ffffff;box-shadow:0 12px 34px rgba(38,24,68,.08);">
        <div style="padding:22px 28px;background:#21143a;color:#ffffff;font-size:18px;font-weight:700;">FilamentHub</div>
        <div style="padding:30px 28px;white-space:pre-wrap;font-size:15px;line-height:1.65;">{{ body }}</div>
        <div style="border-top:1px solid #eee8f4;padding:18px 28px;color:#746b80;font-size:12px;line-height:1.5;">
          Ответ отправлен командой FilamentHub · {{ contact_email }}
        </div>
      </div>
    </div>
  </body>
</html>
